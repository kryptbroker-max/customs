<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f5f8;
      color: #152238;
    }
    .app {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .header h1 {
      margin: 0;
      font-size: 24px;
    }
    input, textarea, button {
      font: inherit;
    }
    input[type="password"], input[type="text"], textarea {
      width: 100%;
      border: 1px solid #cdd5df;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: #1f4a7c;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #5e6f84;
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .panel {
      background: #fff;
      border: 1px solid #d6deea;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(20, 32, 50, 0.08);
      padding: 14px;
    }
    .panel h3 {
      margin-top: 0;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 12px;
    }
    .message-list {
      max-height: 70vh;
      overflow: auto;
    }
    .thread-item {
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      background: #f9fbff;
    }
    .thread-item.active {
      border-color: #1f4a7c;
      background: #edf4ff;
    }
    .thread-title {
      margin: 4px 0;
      font-weight: 700;
    }
    .thread-count {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 11px;
      font-weight: 700;
    }
    .meta {
      color: #4f6077;
      font-size: 12px;
    }
    .subject {
      margin: 4px 0;
      font-weight: 700;
    }
    .preview {
      color: #47586f;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .detail pre {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid #dbe5f0;
      border-radius: 8px;
      padding: 12px;
      max-height: 250px;
      overflow: auto;
    }
    .thread-message {
      border: 1px solid #dbe5f0;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .thread-message.outbound {
      background: #f8fbff;
    }
    .thread-message.inbound {
      background: #fefefe;
    }
    .thread-message .message-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #4f6077;
    }
    .thread-message .message-body {
      white-space: pre-wrap;
      font-size: 13px;
      color: #152238;
    }
    .muted {
      color: #5b6f88;
      font-size: 13px;
    }
    .status {
      margin: 10px 0;
      min-height: 20px;
      font-size: 13px;
    }
    .reply-box textarea {
      min-height: 120px;
      margin-top: 6px;
      margin-bottom: 8px;
      resize: vertical;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .message-list { max-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Inbox Admin</h1>
      <button id="refreshBtn">Refresh</button>
    </div>

    <div class="status" id="status"></div>

    <div class="layout">
      <div class="panel">
        <h3>Messages</h3>
        <div id="messageList" class="message-list"></div>
      </div>

      <div class="panel detail">
        <h3>Message Detail</h3>
        <div id="detailEmpty" class="muted">Select a message to view and reply.</div>
        <div id="detailBody" class="hidden">
          <p><strong>From:</strong> <span id="from"></span></p>
          <p><strong>To:</strong> <span id="to"></span></p>
          <p><strong>Subject:</strong> <span id="subject"></span></p>
          <p><strong>Received:</strong> <span id="receivedAt"></span></p>

          <h4>Text</h4>
          <pre id="text"></pre>

          <h4>Reply</h4>
          <div class="reply-box">
            <input id="replySubject" type="text" placeholder="Reply subject" />
            <textarea id="replyText" placeholder="Type your reply"></textarea>
            <button id="sendReplyBtn">Send Reply</button>
          </div>

          <h4>Sent Replies</h4>
          <div id="replies" class="muted">No replies yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const refreshBtn = document.getElementById('refreshBtn');
    const messageListEl = document.getElementById('messageList');
    const detailEmpty = document.getElementById('detailEmpty');
    const detailBody = document.getElementById('detailBody');
    const fromEl = document.getElementById('from');
    const toEl = document.getElementById('to');
    const subjectEl = document.getElementById('subject');
    const receivedAtEl = document.getElementById('receivedAt');
    const textEl = document.getElementById('text');
    const repliesEl = document.getElementById('replies');
    const replySubjectEl = document.getElementById('replySubject');
    const replyTextEl = document.getElementById('replyText');
    const sendReplyBtn = document.getElementById('sendReplyBtn');

    let messages = [];
    let selectedId = null;
    let selectedThreadId = null;

    function getThreadMessages(threadId) {
      return messages
        .filter(message => (message.threadId || message.id) === threadId)
        .sort((a, b) => new Date(a.receivedAt || 0).getTime() - new Date(b.receivedAt || 0).getTime());
    }

    function getThreadMessageCount(threadId) {
      return getThreadMessages(threadId).length;
    }

    function getLatestMessageForThread(threadId) {
      const threadMessages = getThreadMessages(threadId);
      return threadMessages[threadMessages.length - 1] || null;
    }

    function getReplyTargetForThread(threadId) {
      const threadMessages = getThreadMessages(threadId);
      const latestInbound = [...threadMessages].reverse().find(message => message.direction !== 'outbound');
      return latestInbound || threadMessages[threadMessages.length - 1] || null;
    }

    function groupThreads() {
      const byThread = new Map();
      for (const message of messages) {
        const threadId = message.threadId || message.id;
        if (!byThread.has(threadId)) {
          byThread.set(threadId, []);
        }
        byThread.get(threadId).push(message);
      }

      return [...byThread.entries()].map(([threadId, threadMessages]) => {
        threadMessages.sort((a, b) => new Date(a.receivedAt || 0).getTime() - new Date(b.receivedAt || 0).getTime());
        const latest = threadMessages[threadMessages.length - 1] || null;
        const replyTarget = getReplyTargetForThread(threadId);

        return {
          threadId,
          messages: threadMessages,
          latest,
          replyTarget,
          count: threadMessages.length
        };
      }).sort((a, b) => new Date(b.latest?.receivedAt || 0).getTime() - new Date(a.latest?.receivedAt || 0).getTime());
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? '#9c1f1f' : '#1a5b2a';
    }

    async function api(path, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...(options.headers || {})
      };

      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || 'Request failed');
      }
      return data;
    }

    function renderList() {
      messageListEl.innerHTML = '';
      if (!messages.length) {
        messageListEl.innerHTML = '<div class="muted">No threaded messages yet.</div>';
        return;
      }

      const threads = groupThreads();

      for (const thread of threads) {
        const item = document.createElement('div');
        item.className = 'thread-item' + (thread.threadId === selectedThreadId ? ' active' : '');
        item.innerHTML = `
          <div class="meta">${new Date(thread.latest?.receivedAt || Date.now()).toLocaleString()}</div>
          <div class="thread-title">${thread.latest?.subject || '(no subject)'}<span class="thread-count">${thread.count}</span></div>
          <div class="meta">${thread.replyTarget?.from || thread.latest?.from || 'Unknown sender'}</div>
          <div class="preview">${thread.latest?.textPreview || ''}</div>
        `;
        item.addEventListener('click', () => selectThread(thread.threadId));
        messageListEl.appendChild(item);
      }
    }

    function renderDetail(thread) {
      if (!thread) {
        detailEmpty.style.display = 'block';
        detailBody.style.display = 'none';
        return;
      }

      detailEmpty.style.display = 'none';
      detailBody.style.display = 'block';
      const replyTarget = thread.replyTarget || thread.latest;

      fromEl.textContent = replyTarget?.from || '';
      toEl.textContent = replyTarget?.to || '';
      subjectEl.textContent = thread.latest?.subject || '';
      receivedAtEl.textContent = new Date(thread.latest?.receivedAt || Date.now()).toLocaleString();
      textEl.textContent = thread.latest?.text || '(no text body)';

      const defaultReplySubject = thread.latest?.subject && thread.latest.subject.toLowerCase().startsWith('re:')
        ? thread.latest.subject
        : `Re: ${thread.latest?.subject || '(no subject)'}`;
      replySubjectEl.value = defaultReplySubject;
      replyTextEl.value = '';

      if (!thread.messages.length) {
        repliesEl.innerHTML = '<span class="muted">No messages yet.</span>';
      } else {
        repliesEl.innerHTML = thread.messages.map(r => {
          const sentAt = r.receivedAt ? new Date(r.receivedAt).toLocaleString() : (r.sentAt ? new Date(r.sentAt).toLocaleString() : '');
          const role = r.direction || 'inbound';
          return `<div class="thread-message ${role}"><div class="message-head"><div><strong>${r.subject || '(no subject)'}</strong></div><div class="meta">${role.toUpperCase()}</div></div><div class="meta">From: ${r.from || ''} | To: ${r.to || ''} | ${sentAt}</div><div class="message-body">${r.text || '(no text body)'}</div><div class="meta">Message ID: ${r.messageId || ''}</div></div>`;
        }).join('');
      }
    }

    async function loadMessages() {
      setStatus('Loading inbox...');
      const data = await api('/admin/api/messages');
      messages = data.messages || [];
      renderList();
      if (selectedThreadId) {
        await selectThread(selectedThreadId, false);
      }
      setStatus(`Loaded ${messages.length} message(s).`);
    }

    async function selectMessage(id, updateList = true) {
      const message = messages.find(item => item.id === id);
      if (!message) return;
      selectedThreadId = message.threadId || message.id;
      selectedId = id;
      const thread = {
        threadId: selectedThreadId,
        messages: getThreadMessages(selectedThreadId),
        latest: getLatestMessageForThread(selectedThreadId),
        replyTarget: getReplyTargetForThread(selectedThreadId)
      };
      if (updateList) renderList();
      const data = await api(`/admin/api/messages/${encodeURIComponent(id)}`);
      renderDetail({
        ...thread,
        latest: data.message ? data.message : thread.latest
      });
    }

    async function selectThread(threadId, updateList = true) {
      selectedThreadId = threadId;
      const threadMessages = getThreadMessages(threadId);
      const replyTarget = getReplyTargetForThread(threadId);
      selectedId = replyTarget?.id || threadMessages[0]?.id || null;
      if (updateList) renderList();
      if (!replyTarget) {
        renderDetail({ threadId, messages: threadMessages, latest: getLatestMessageForThread(threadId), replyTarget: null });
        return;
      }
      const data = await api(`/admin/api/messages/${encodeURIComponent(replyTarget.id)}`);
      renderDetail({
        threadId,
        messages: threadMessages,
        latest: getLatestMessageForThread(threadId),
        replyTarget: data.message || replyTarget
      });
    }

    refreshBtn.addEventListener('click', async () => {
      try {
        await loadMessages();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    sendReplyBtn.addEventListener('click', async () => {
      if (!selectedId) return;
      const text = replyTextEl.value.trim();
      const subject = replySubjectEl.value.trim();
      if (!text) {
        setStatus('Reply body is required.', true);
        return;
      }

      sendReplyBtn.disabled = true;
      try {
        const result = await api(`/admin/api/messages/${encodeURIComponent(selectedId)}/reply`, {
          method: 'POST',
          body: JSON.stringify({ subject, text })
        });
        setStatus(`Reply sent. Message ID: ${result.messageId}`);
        await selectThread(selectedThreadId, false);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        sendReplyBtn.disabled = false;
      }
    });

    loadMessages().catch(err => setStatus(err.message, true));
  </script>
</body>
</html>
